name: Release & Update Major Tags

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install Dependencies & Build Action
        run: |
          pnpm install
          pnpm run build

      - name: Read version from package.json
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: ./

      - name: Create Git Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.current-version}}
          name: Release v${{ steps.package-version.outputs.current-version}}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Major/Minor Tags (e.g. v1, v1.0)
        run: |
          VERSION="v${{ steps.package-version.outputs.current-version }}"
          
          # Extract major and minor version parts (e.g. v1, v1.0 from v1.2.3)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)

          echo "Updating major tag: $MAJOR and minor tag: $MINOR"

          # Force update major tag locally and push using default GITHUB_TOKEN
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f $MAJOR $VERSION
          git tag -f $MINOR $VERSION
          git push origin $MAJOR --force
          git push origin $MINOR --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
